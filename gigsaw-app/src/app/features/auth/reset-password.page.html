<ion-header><ion-toolbar><ion-title>Nuova password</ion-title></ion-toolbar></ion-header>
<ion-content class="ion-padding"><form [formGroup]="form" (ngSubmit)="submit()"><ion-item><ion-label position="stacked">Email</ion-label><ion-input type="email" autocomplete="email" formControlName="email" /></ion-item><ion-item><ion-label position="stacked">Password</ion-label><ion-input type="password" autocomplete="new-password" formControlName="password" /></ion-item><ion-item><ion-label position="stacked">Conferma password</ion-label><ion-input type="password" autocomplete="new-password" formControlName="password_confirmation" /></ion-item>@if (success) {
<ion-note color="success">{{ success }}</ion-note>
}@if (error) {
<ion-note color="danger">{{ error }}</ion-note>
}<ion-button expand="block" class="ion-margin-top" type="submit" [disabled]="loading">@if(loading){<ion-spinner name="crescent"/>}@else{Aggiorna password}</ion-button></form><ion-button expand="block" fill="clear" routerLink="/login">Torna al login</ion-button></ion-content>
