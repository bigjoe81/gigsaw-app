<ion-header><ion-toolbar><ion-title>Crea account</ion-title></ion-toolbar></ion-header>
<ion-content class="ion-padding"><form [formGroup]="form" (ngSubmit)="register()"><ion-item><ion-label position="stacked">Nome</ion-label><ion-input formControlName="name" /></ion-item><ion-item><ion-label position="stacked">Email</ion-label><ion-input type="email" autocomplete="email" formControlName="email" /></ion-item><ion-item><ion-label position="stacked">Password</ion-label><ion-input type="password" autocomplete="new-password" formControlName="password" /></ion-item><ion-item><ion-label position="stacked">Conferma password</ion-label><ion-input type="password" autocomplete="new-password" formControlName="password_confirmation" /></ion-item>@if (error) {
<ion-note color="danger">{{ error }}</ion-note>
}<ion-button expand="block" class="ion-margin-top" type="submit" [disabled]="loading">@if(loading){<ion-spinner name="crescent"/>}@else{Registrati}</ion-button></form><ion-button expand="block" fill="clear" routerLink="/login">Hai già un account? Accedi</ion-button></ion-content>
