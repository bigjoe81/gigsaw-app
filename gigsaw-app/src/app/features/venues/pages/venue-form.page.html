<ion-header><ion-toolbar><ion-buttons slot="start"><ion-back-button defaultHref="../" /></ion-buttons><ion-title>{{ editing ? 'Modifica venue' : 'Nuova venue' }}</ion-title><ion-buttons slot="end"><ion-button (click)="save()" [disabled]="saving">@if(saving){<ion-spinner name="crescent" />}@else{Salva}</ion-button></ion-buttons></ion-toolbar></ion-header>
<ion-content><form [formGroup]="form" (ngSubmit)="save()"><ion-item><ion-label position="stacked">Nome *</ion-label><ion-input formControlName="name" /></ion-item><ion-item><ion-label position="stacked">Indirizzo</ion-label><ion-input formControlName="address" /></ion-item><ion-item><ion-label position="stacked">Città</ion-label><ion-input formControlName="city" /></ion-item><ion-item><ion-label position="stacked">Latitudine</ion-label><ion-input type="number" formControlName="latitude" /></ion-item><ion-item><ion-label position="stacked">Longitudine</ion-label><ion-input type="number" formControlName="longitude" /></ion-item>@if (error) {
<ion-note class="ion-padding" color="danger">{{ error }}</ion-note>
}<ion-button class="ion-margin" type="submit" expand="block" [disabled]="saving">Salva venue</ion-button></form></ion-content>
