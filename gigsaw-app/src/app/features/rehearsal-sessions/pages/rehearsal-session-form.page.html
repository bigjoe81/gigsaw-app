<ion-header><ion-toolbar><ion-buttons slot="start"><ion-back-button defaultHref="../" /></ion-buttons><ion-title>{{ editing ? 'Modifica prova' : 'Nuova prova' }}</ion-title><ion-buttons slot="end"><ion-button (click)="save()" [disabled]="saving">@if(saving){<ion-spinner name="crescent" />}@else{Salva}</ion-button></ion-buttons></ion-toolbar></ion-header>
<ion-content><form [formGroup]="form" (ngSubmit)="save()"><ion-item><ion-label position="stacked">Titolo *</ion-label><ion-input formControlName="title" /></ion-item><ion-item><ion-label position="stacked">Data *</ion-label><ion-datetime-button datetime="rehearsal-date" /></ion-item><ion-modal [keepContentsMounted]="true"><ng-template><ion-datetime id="rehearsal-date" presentation="date" locale="it-IT" [value]="form.controls.date.value" (ionChange)="onDateChange($event)" /></ng-template></ion-modal><ion-item><ion-label position="stacked">Ora inizio</ion-label><ion-input type="time" formControlName="startTime" /></ion-item><ion-item><ion-label position="stacked">Ora fine</ion-label><ion-input type="time" formControlName="endTime" /></ion-item><ion-item><ion-label position="stacked">ID sala prove</ion-label><ion-input type="number" formControlName="rehearsalRoomId" /></ion-item><ion-item><ion-label position="stacked">Note</ion-label><ion-textarea autoGrow formControlName="notes" /></ion-item>@if (error) {
<ion-note class="ion-padding" color="danger">{{ error }}</ion-note>
}<ion-button class="ion-margin" type="submit" expand="block" [disabled]="saving">Salva prova</ion-button></form></ion-content>
