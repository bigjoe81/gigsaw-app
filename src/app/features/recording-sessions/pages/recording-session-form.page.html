<ion-header><ion-toolbar><ion-buttons slot="start"><ion-back-button defaultHref="../" /></ion-buttons><ion-title>{{ editing ? 'Modifica sessione' : 'Nuova sessione' }}</ion-title><ion-buttons slot="end"><ion-button (click)="save()" [disabled]="saving">@if(saving){<ion-spinner name="crescent" />}@else{Salva}</ion-button></ion-buttons></ion-toolbar></ion-header>
<ion-content><form [formGroup]="form" (ngSubmit)="save()"><ion-item><ion-label position="stacked">Titolo *</ion-label><ion-input formControlName="title" /></ion-item><ion-item><ion-label position="stacked">Data *</ion-label><ion-datetime-button datetime="recording-date" /></ion-item><ion-modal [keepContentsMounted]="true"><ng-template><ion-datetime id="recording-date" presentation="date" locale="it-IT" [value]="form.controls.date.value" (ionChange)="onDateChange($event)" /></ng-template></ion-modal><ion-item><ion-label position="stacked">ID brano</ion-label><ion-input type="number" formControlName="songId" /></ion-item><ion-item><ion-label position="stacked">Luogo</ion-label><ion-input formControlName="location" /></ion-item><ion-item><ion-label position="stacked">Numero take</ion-label><ion-input type="number" formControlName="takeNumber" /></ion-item><ion-item><ion-label position="stacked">URL audio</ion-label><ion-input type="url" formControlName="audioUrl" /></ion-item><ion-item><ion-label position="stacked">Note</ion-label><ion-textarea autoGrow formControlName="notes" /></ion-item>@if (error) {
<ion-note class="ion-padding" color="danger">{{ error }}</ion-note>
}<ion-button class="ion-margin" type="submit" expand="block" [disabled]="saving">Salva sessione</ion-button></form></ion-content>
