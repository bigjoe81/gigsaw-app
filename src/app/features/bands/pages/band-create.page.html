<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/bands" />
    </ion-buttons>
    <ion-title>Nuova band</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="save()">
    <ion-item>
      <ion-label position="stacked">Nome band</ion-label>
      <ion-input formControlName="name" />
    </ion-item>

    @if (error) {
      <ion-note color="danger" class="ion-padding-horizontal ion-padding-top">{{ error }}</ion-note>
    }

    <ion-button expand="block" class="ion-margin-top" type="submit" [disabled]="saving">
      @if (saving) {
        <ion-spinner name="crescent" />
      } @else {
        Crea band
      }
    </ion-button>
  </form>
</ion-content>
